<section>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Meetings</h2>
  </div>

  <form class="row g-2 align-items-center mb-4" (ngSubmit)="createMeeting()" #form="ngForm">
    <div class="col-auto">
      <input type="text" class="form-control" name="title" placeholder="Title" [(ngModel)]="newMeeting.title" required />
    </div>
    <div class="col-auto">
      <input type="datetime-local" class="form-control" name="started_at" [(ngModel)]="newMeeting.started_at" required />
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary" [disabled]="creating || form.invalid">Add meeting</button>
    </div>
  </form>
  <div class="alert alert-danger" role="alert" *ngIf="createError">{{ createError }}</div>

  <p *ngIf="loading">Loading meetings...</p>
  <div class="alert alert-danger" role="alert" *ngIf="error">{{ error }}</div>

  <table class="table table-striped table-hover align-middle" *ngIf="!loading && !error">
    <thead>
      <tr>
        <th>Title</th>
        <th>Started at</th>
        <th>Notes</th>
        <th>Summary</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let meeting of meetings">
        <td><a [routerLink]="[meeting.id]">{{ meeting.title }}</a></td>
        <td>{{ meeting.started_at | date: 'medium' }}</td>
        <td>{{ meeting.note_count }}</td>
        <td><span class="badge" [ngClass]="summaryBadgeClass(meeting)">{{ summaryBadge(meeting) }}</span></td>
      </tr>
      <tr *ngIf="meetings.length === 0">
        <td colspan="4" class="text-muted">No meetings yet.</td>
      </tr>
    </tbody>
  </table>

  <div class="d-flex align-items-center gap-3" *ngIf="!loading && !error">
    <button class="btn btn-outline-secondary btn-sm" (click)="previousPage()" [disabled]="!hasPrevious">Previous</button>
    <span>Page {{ page }}</span>
    <button class="btn btn-outline-secondary btn-sm" (click)="nextPage()" [disabled]="!hasNext">Next</button>
  </div>
</section>
